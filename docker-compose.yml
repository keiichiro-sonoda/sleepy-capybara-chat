services:
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
  #   depends_on:
  #     - frontend
  #     - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
      - ./frontend/.env.local
    environment:
      # 開発環境固有の設定のみ
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/src/app
      - ./backend/tests:/src/tests
      - ./backend/migrations:/src/migrations
    user: "1000:1000"  # appuserのUID:GIDを指定
    env_file:
      # 環境変数ファイルの読み込み順序（後に読み込まれたファイルが優先）
      - .env                    # 共通設定
      - ./backend/.env         # バックエンド固有設定
    environment:
      # 開発環境固有の設定のみ
      - ENVIRONMENT=development
    depends_on:
      - db
      - ollama
      - mailhog

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: always

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI (ブラウザでメール確認可能)

  # Cloudflare Tunnel サービス
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    env_file:
      - .env
    environment:
      # TUNNEL_TOKENが設定されていない場合はエラーメッセージを表示
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN environment variable is required}
    volumes:
      - cloudflared_data:/home/nonroot/.cloudflared

volumes:
  postgres_data:
  ollama_data:
  cloudflared_data: 
