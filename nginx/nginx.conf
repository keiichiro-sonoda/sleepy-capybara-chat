# ========================================
# NGINX設定ファイル（現在未使用）
# ========================================
#
# 【現在の状況】
# このnginx設定は現在使用されていません。
# docker-compose.ymlでnginxサービスがコメントアウトされています。
#
# 【理由】
# Cloudflare Tunnelが以下の機能を提供しているため、nginxが不要：
# - SSL/TLS終端
# - リバースプロキシ
# - DDoS保護
# - セキュリティヘッダー
#
# 【現在の構成】
# Internet → Cloudflare → Tunnel → frontend:3000 (直接)
# Internet → Cloudflare → Tunnel → backend:8000 (直接)
#
# 【将来的にnginxを使用する場合】
# 以下が必要になった場合に、docker-compose.ymlのnginxサービスを
# アンコメントし、この設定ファイルを使用してください：
# - より細かいアクセス制御
# - カスタムログフォーマット
# - レート制限の強化
# - 静的ファイル配信の最適化
#
# 【nginx使用時の構成】
# Internet → Cloudflare → Tunnel → nginx:80 → frontend:3000/backend:8000
# ========================================

server {
    listen 80;
    server_name localhost;

    # フロントエンド（Next.js）へのプロキシ
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # バックエンドAPI（FastAPI）へのプロキシ
    # /api/* のリクエストを backend:8000/* にリライト
    location /api {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
} 
