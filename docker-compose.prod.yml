services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # ビルド時に環境変数をARGとして渡す
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Sleepy Capybara Chat}
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    # 本番では開発用ボリュームマウントを削除
    # volumes:
    #   - ./frontend:/app  # 開発用のみ

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      # 本番環境の環境変数ファイル読み込み順序
      - .env.prod              # 本番環境共通設定
      - ./backend/.env.prod    # バックエンド本番環境設定
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped
    # 本番では開発用ボリュームマウントを削除
    # volumes:
    #   - ./backend/app:/src/app  # 開発用のみ
    depends_on:
      - db
      - ollama

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - .env.prod
    # 本番環境ではGPUを使用しない
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           capabilities: [gpu]
    restart: unless-stopped

  db:
    image: postgres:15
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # 本番環境ではポートを公開しない（セキュリティ向上）
    # ports:
    #   - "5432:5432"

  # 本番環境ではmailhogを削除（Gmail SMTPを使用）
  # mailhog:
  #   image: mailhog/mailhog
  #   ports:
  #     - "1025:1025"
  #     - "8025:8025"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    env_file:
      - .env.prod
    environment:
      # TUNNEL_TOKENが設定されていない場合はエラーメッセージを表示
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN environment variable is required}
    volumes:
      - cloudflared_data:/home/nonroot/.cloudflared

volumes:
  postgres_data:
  ollama_data:
  cloudflared_data: 
